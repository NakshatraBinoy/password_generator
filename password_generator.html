<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PASSFORGE</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222222;
    --accent: #e8ff00;
    --accent2: #ff4d00;
    --text: #f0f0f0;
    --muted: #555;
    --track: #1a1a1a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,255,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,255,0,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .container {
    width: 480px;
    max-width: 95vw;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 4px;
    color: var(--accent);
    line-height: 1;
  }

  .tagline {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 28px;
    font-family: 'Share Tech Mono', monospace;
  }

  /* Main card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 28px;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 40px; height: 3px;
    background: var(--accent);
  }

  /* Password output */
  .output-section {
    margin-bottom: 24px;
  }

  .output-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .output-box {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    min-height: 60px;
    position: relative;
    overflow: hidden;
  }

  .output-box::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
  }

  #password-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 15px;
    color: var(--text);
    word-break: break-all;
    flex: 1;
    letter-spacing: 1px;
    transition: opacity 0.15s;
  }

  #password-display.flash {
    opacity: 0;
  }

  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .copy-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .copy-btn.copied {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,255,0,0.05);
  }

  /* Strength bar */
  .strength-section {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .strength-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    min-width: 70px;
  }

  .strength-bars {
    display: flex;
    gap: 4px;
    flex: 1;
  }

  .s-bar {
    height: 4px;
    flex: 1;
    background: var(--track);
    transition: background 0.3s;
  }

  .strength-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    min-width: 60px;
    text-align: right;
  }

  /* Divider */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin-bottom: 24px;
  }

  /* Length slider */
  .control-row {
    margin-bottom: 20px;
  }

  .control-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .control-name {
    font-size: 12px;
    color: var(--text);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 500;
  }

  .control-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--accent);
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 2px;
    background: var(--track);
    outline: none;
    position: relative;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: var(--accent);
    cursor: pointer;
    border: none;
    transform: rotate(45deg);
    transition: transform 0.2s;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    transform: rotate(45deg) scale(1.2);
  }

  /* Toggles */
  .toggles-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 24px;
  }

  .toggle-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }

  .toggle-item:hover {
    border-color: #333;
  }

  .toggle-item.active {
    border-color: var(--accent);
    background: rgba(232,255,0,0.04);
  }

  .toggle-name {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: color 0.2s;
  }

  .toggle-item.active .toggle-name {
    color: var(--text);
  }

  .toggle-dot {
    width: 8px;
    height: 8px;
    border: 1px solid var(--border);
    background: none;
    transition: all 0.2s;
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  .toggle-item.active .toggle-dot {
    background: var(--accent);
    border-color: var(--accent);
  }

  /* Generate button */
  .gen-btn {
    width: 100%;
    background: var(--accent);
    border: none;
    padding: 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 4px;
    color: #000;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .gen-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .gen-btn:hover::after { opacity: 0.1; }
  .gen-btn:active { transform: scale(0.99); }

  /* History */
  .history-section {
    margin-top: 16px;
  }

  .history-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 80px;
    overflow: hidden;
  }

  .history-item {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #333;
    padding: 4px 0;
    border-bottom: 1px solid #161616;
    cursor: pointer;
    transition: color 0.2s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .history-item:hover { color: var(--muted); }
  .history-item:first-child { color: #444; }

  /* Tooltip */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #000;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 10px 24px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>PASSFORGE</h1>
  </div>
  <div class="tagline">// secure password generator</div>

  <div class="card">

    <!-- Output -->
    <div class="output-section">
      <div class="output-label">Generated Password</div>
      <div class="output-box">
        <span id="password-display">Click generate to start</span>
        <button class="copy-btn" id="copy-btn" onclick="copyPassword()">COPY</button>
      </div>
    </div>

    <!-- Strength -->
    <div class="strength-section">
      <div class="strength-label">Strength</div>
      <div class="strength-bars">
        <div class="s-bar" id="s1"></div>
        <div class="s-bar" id="s2"></div>
        <div class="s-bar" id="s3"></div>
        <div class="s-bar" id="s4"></div>
        <div class="s-bar" id="s5"></div>
      </div>
      <div class="strength-text" id="strength-text" style="color: var(--muted)">—</div>
    </div>

    <hr class="divider">

    <!-- Length -->
    <div class="control-row">
      <div class="control-header">
        <span class="control-name">Length</span>
        <span class="control-value" id="length-val">16</span>
      </div>
      <input type="range" id="length-slider" min="6" max="64" value="16" oninput="updateLength(this.value)">
    </div>

    <!-- Toggles -->
    <div class="toggles-grid">
      <div class="toggle-item active" id="t-upper" onclick="toggleOption('upper')">
        <span class="toggle-name">Uppercase</span>
        <div class="toggle-dot"></div>
      </div>
      <div class="toggle-item active" id="t-lower" onclick="toggleOption('lower')">
        <span class="toggle-name">Lowercase</span>
        <div class="toggle-dot"></div>
      </div>
      <div class="toggle-item active" id="t-numbers" onclick="toggleOption('numbers')">
        <span class="toggle-name">Numbers</span>
        <div class="toggle-dot"></div>
      </div>
      <div class="toggle-item active" id="t-symbols" onclick="toggleOption('symbols')">
        <span class="toggle-name">Symbols</span>
        <div class="toggle-dot"></div>
      </div>
      <div class="toggle-item" id="t-ambiguous" onclick="toggleOption('ambiguous')">
        <span class="toggle-name">No Ambig.</span>
        <div class="toggle-dot"></div>
      </div>
      <div class="toggle-item" id="t-memorable" onclick="toggleOption('memorable')">
        <span class="toggle-name">Memorable</span>
        <div class="toggle-dot"></div>
      </div>
    </div>

    <!-- Generate -->
    <button class="gen-btn" onclick="generate()">GENERATE</button>

    <!-- History -->
    <div class="history-section">
      <div class="history-label">// recent</div>
      <div class="history-list" id="history-list"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast">COPIED TO CLIPBOARD</div>

<script>
  const opts = { upper: true, lower: true, numbers: true, symbols: true, ambiguous: false, memorable: false };
  let currentPassword = '';
  const history = [];

  const UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const LOWER = 'abcdefghijklmnopqrstuvwxyz';
  const NUMS  = '0123456789';
  const SYMS  = '!@#$%^&*()_+-=[]{}|;:,.<>?';
  const AMBIG = 'Il1O0o';

  const WORDS = ['solar','mango','tiger','blaze','frost','stone','swift','cloud','lunar','ember','crest','delta','flint','grove','haven','ridge','spark','stark','vault','zenith','crane','drift','echo','fable','glow','haze','iris','jade','knot','loft','myth','nova','orb','pike','quest','rune','sage','tide','umbra','vine','wild','yew','zeal'];

  function updateLength(v) {
    document.getElementById('length-val').textContent = v;
  }

  function toggleOption(key) {
    // prevent all off
    const active = Object.entries(opts).filter(([k,v]) => ['upper','lower','numbers','symbols'].includes(k) && v);
    if (active.length === 1 && active[0][0] === key) return;

    // memorable and ambiguous are independent
    opts[key] = !opts[key];
    const el = document.getElementById('t-' + key);
    el.classList.toggle('active', opts[key]);
  }

  function buildCharset() {
    let set = '';
    if (opts.upper) set += UPPER;
    if (opts.lower) set += LOWER;
    if (opts.numbers) set += NUMS;
    if (opts.symbols) set += SYMS;
    if (opts.ambiguous) set = set.split('').filter(c => !AMBIG.includes(c)).join('');
    return set;
  }

  function memorablePassword(len) {
    let result = '';
    while (result.length < len) {
      const w = WORDS[Math.floor(Math.random() * WORDS.length)];
      result += (result.length === 0 ? w : '-' + w);
    }
    return result.slice(0, len);
  }

  function generate() {
    const len = parseInt(document.getElementById('length-slider').value);
    let pwd;

    if (opts.memorable) {
      pwd = memorablePassword(len);
    } else {
      const charset = buildCharset();
      if (!charset) return;
      const arr = new Uint32Array(len);
      crypto.getRandomValues(arr);
      pwd = Array.from(arr).map(n => charset[n % charset.length]).join('');
    }

    // Flash animation
    const disp = document.getElementById('password-display');
    disp.classList.add('flash');
    setTimeout(() => {
      currentPassword = pwd;
      disp.textContent = pwd;
      disp.classList.remove('flash');
    }, 120);

    updateStrength(pwd);
    addHistory(pwd);

    // Reset copy btn
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'COPY';
    btn.classList.remove('copied');
  }

  function updateStrength(pwd) {
    let score = 0;
    if (pwd.length >= 8) score++;
    if (pwd.length >= 16) score++;
    if (/[A-Z]/.test(pwd)) score++;
    if (/[0-9]/.test(pwd)) score++;
    if (/[^a-zA-Z0-9]/.test(pwd)) score++;

    const colors = ['#ff4d00','#ff4d00','#ffaa00','#aadd00','#e8ff00','#e8ff00'];
    const labels = ['—','WEAK','FAIR','GOOD','STRONG','ELITE'];

    for (let i = 1; i <= 5; i++) {
      const bar = document.getElementById('s' + i);
      bar.style.background = i <= score ? colors[score] : 'var(--track)';
    }
    const st = document.getElementById('strength-text');
    st.textContent = labels[score];
    st.style.color = colors[score];
  }

  function addHistory(pwd) {
    history.unshift(pwd);
    if (history.length > 3) history.pop();
    const list = document.getElementById('history-list');
    list.innerHTML = history.map(p =>
      `<div class="history-item" onclick="useHistory('${p}')" title="${p}">${p}</div>`
    ).join('');
  }

  function useHistory(pwd) {
    currentPassword = pwd;
    document.getElementById('password-display').textContent = pwd;
    updateStrength(pwd);
    document.getElementById('copy-btn').textContent = 'COPY';
    document.getElementById('copy-btn').classList.remove('copied');
  }

  function copyPassword() {
    if (!currentPassword) return;
    navigator.clipboard.writeText(currentPassword).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'DONE';
      btn.classList.add('copied');
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    });
  }

  // Generate on load
  generate();
</script>
</body>
</html>
